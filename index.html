<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Проверка контрагента — HomeOffer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#FAFAF8;color:#1A1A1A;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #F0F0EC;padding:0 28px;height:58px;display:flex;align-items:center;gap:16px}
.logo img{height:30px;display:block}
.sep{width:1px;height:20px;background:#E5E5E0}
.hlabel{font-size:13px;color:#6B7280;font-weight:500}
.page{max-width:560px;margin:0 auto;padding:44px 20px 60px}
.bc{font-size:12px;color:#9CA3AF;margin-bottom:22px}
.bc span{color:#1A1A1A;font-weight:500}
h1{font-size:26px;font-weight:700;letter-spacing:-0.4px;margin-bottom:6px}
.sub{font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:28px}
.card{background:#fff;border-radius:16px;border:1px solid #E5E5E0;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.slabel{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#6B7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
.field input{width:100%;border:1.5px solid #E5E5E0;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;color:#1A1A1A;background:#FAFAF8;outline:none;transition:border .15s}
.field input:focus{border-color:#F5C842;box-shadow:0 0 0 3px rgba(245,200,66,.18);background:#fff}
.field input::placeholder{color:#C4C4BC}
hr{border:none;border-top:1px solid #F0F0EC;margin:20px 0}
.btn{width:100%;background:#F5C842;color:#1A1A1A;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.btn:hover:not(:disabled){background:#ECC030}
.btn:disabled{background:#F5E9A0;color:#9CA3AF;cursor:not-allowed}
.tags{margin-top:18px;display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;color:#6B7280;background:#fff;border:1px solid #E5E5E0;padding:4px 10px;border-radius:20px}
#res{display:none;margin-top:28px}
.ts{font-size:12px;color:#9CA3AF;margin-bottom:14px}
.pname{font-size:22px;font-weight:700;letter-spacing:-0.3px;margin-bottom:3px}
.pdob{font-size:13px;color:#6B7280;margin-bottom:20px}
.verdict{border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:6px;border:1.5px solid #FDE68A;background:#FEFCE8}
.vdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#F5C842}
.vtxt{font-size:14px;font-weight:600;color:#92400E}
.rcard{background:#fff;border-radius:16px;border:1px solid #E5E5E0;padding:4px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:16px}
.srow{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #F5F5F2}
.srow:last-child{border-bottom:none}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:2px}
.sname{font-size:13px;font-weight:600;color:#1A1A1A}
.sdet{font-size:13px;margin-top:1px}
.slink{font-size:12px;color:#9CA3AF;text-decoration:none;white-space:nowrap;flex-shrink:0}
.btn2{display:inline-block;margin-top:18px;background:#F5C842;color:#1A1A1A;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#F5C842;animation:pulse 1s infinite;margin-right:6px;vertical-align:middle}
@media(max-width:480px){.r2,.r3{grid-template-columns:1fr}.page{padding:28px 16px}.card{padding:20px}}
</style>
</head>

    <button class="btn" id="btn" onclick="run()">Проверить</button>
  </div>
  <div class="tags">
    <div class="tag">Федресурс</div><div class="tag">ФССП</div>
    <div class="tag">Росфинмониторинг</div><div class="tag">ФСИН</div>
    <div class="tag">ГАС Правосудие</div>
  </div>
  <div id="res">
    <div class="ts" id="ts"></div>
    <div class="pname" id="pname"></div>
    <div class="pdob" id="pdob"></div>
    <div class="verdict" id="verdict">
      <div class="vdot" id="vdot" style="animation:pulse 1s infinite"></div>
      <div class="vtxt" id="vtxt">Проверяем по реестрам...</div>
    </div>
    <div class="rcard" id="rcard"></div>
    <button class="btn2" onclick="back()">Проверить другого</button>
  </div>
</div>
<script>
const API="https://functions.yandexcloud.net/d4e9hppm9qk7pbprsoe6";
const DOT={clean:"#16A34A",found:"#EF4444",error:"#D1D5DB"};
const CLR={clean:"#16A34A",found:"#B91C1C",error:"#9CA3AF"};
const OV={
  success:["#F0FDF4","#BBF7D0","#16A34A","#15803D","По всем источникам совпадений не найдено"],
  danger: ["#FEF2F2","#FECACA","#EF4444","#B91C1C","Найдены совпадения — необходима ручная проверка"],
  warning:["#FEFCE8","#FDE68A","#F5C842","#92400E","Часть источников временно недоступна"]
};

async function run(){
  const last=document.getElementById("last").value.trim();
  const first=document.getElementById("first").value.trim();
  const mid=document.getElementById("mid").value.trim();
  const dob=document.getElementById("dob").value.trim();
  const inn=document.getElementById("inn").value.trim();
  if(!last||!first||!dob){alert("Заполните Фамилию, Имя и Дату рождения");return;}
  document.getElementById("btn").disabled=true;
  document.getElementById("btn").textContent="Проверяем...";
  document.getElementById("res").style.display="block";
  document.getElementById("ts").textContent="Проверка выполнена "+new Date().toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  document.getElementById("pname").textContent=`${last} ${first} ${mid}`.trim();
  document.getElementById("pdob").textContent="Дата рождения: "+dob+(inn?" · ИНН "+inn:"");
  document.getElementById("rcard").innerHTML='<div style="padding:20px;text-align:center;color:#9CA3AF;font-size:14px"><span class="pulse"></span>Запрашиваем данные...</div>';
  try{
    const r=await fetch(`${API}?last=${encodeURIComponent(last)}&first=${encodeURIComponent(first)}&mid=${encodeURIComponent(mid)}&dob=${encodeURIComponent(dob)}&inn=${encodeURIComponent(inn)}`,{signal:AbortSignal.timeout(65000)});
    const d=await r.json();
    const [bg,brd,dot,clr]=OV[d.overall_status]||OV.warning;
    const v=document.getElementById("verdict");
    v.style.cssText=`border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:6px;border:1.5px solid ${brd};background:${bg}`;
    document.getElementById("vdot").style.cssText=`width:10px;height:10px;border-radius:50%;flex-shrink:0;background:${dot}`;
    document.getElementById("vtxt").style.color=clr;
    document.getElementById("vtxt").textContent=d.overall_text;
    document.getElementById("rcard").innerHTML=(d.sources||[]).map(s=>`
      <div class="srow">
        <div class="sdot" style="background:${DOT[s.status]||"#ccc"}"></div>
        <div style="flex:1;min-width:0">
          <div class="sname">${s.name}</div>
          <div class="sdet" style="color:${CLR[s.status]||"#888"}">${s.detail}</div>
        </div>
        <a href="${s.url}" target="_blank" class="slink">↗</a>
      </div>`).join("");
  }catch(e){
    document.getElementById("vtxt").textContent="Ошибка соединения — попробуйте ещё раз";
    document.getElementById("rcard").innerHTML="";
  }
  document.getElementById("btn").disabled=false;
  document.getElementById("btn").textContent="Проверить";
}

function back(){
  document.getElementById("res").style.display="none";
  ["last","first","mid","dob","inn"].forEach(id=>document.getElementById(id).value="");
}
</script>
</body>
</html>
